name: Keep Render backend awake

on:
  schedule:
    # Every 10 minutes. Render's free tier spins down after ~15 min idle,
    # so this keeps a request landing well inside that window.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf --max-time 60 https://case-study-backend-6upt.onrender.com/api/health || echo "Ping failed (backend may have been cold-starting) - not failing the job"
